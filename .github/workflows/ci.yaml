# CI/CD using GitHub Actions
name: CI/CD

# Exclude the workflow to run on changes to the helm chart
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'
      - 'k8s/**'
      - 'docs/**'
      - 'README.md'

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Lint & test Python code
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 main.py --max-line-length=120 --ignore=E501,W503 || true

      - name: Verify model loads
        run: |
          python -c "
          import pandas as pd
          from sklearn.ensemble import RandomForestClassifier
          print('✅ All imports successful')
          df = pd.read_csv('lead_scoring_dataset.csv')
          print(f'✅ Dataset loaded: {df.shape[0]} rows, {df.shape[1]} columns')
          "

  # ──────────────────────────────────────────────
  # Job 2 : Build & push Docker image
  # ──────────────────────────────────────────────
  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-agent:${{ github.run_id }}

  # ──────────────────────────────────────────────
  # Job 3 : Update image tag in Helm chart values
  # ──────────────────────────────────────────────
  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update tag in Helm chart
        run: |
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' helm/ai-agent-chart/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "amenallahmselmi5@gmail.com"
          git config --global user.name "AmenAllah-Mselmi"
          git add helm/ai-agent-chart/values.yaml
          git commit -m "ci: update ai-agent image tag to ${{ github.run_id }}"
          git push
